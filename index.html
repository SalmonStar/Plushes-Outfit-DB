<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<!-- Open Graph（LINE / Facebook 分享預覽）-->
<meta property="og:type" content="website">

<meta property="og:description" content="整理、瀏覽娃娃造型的輕量圖書館。支援多條件篩選、尺寸搜尋、款式分類。">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="娃衣圖書館 · Plushes Outfit Archive">
<meta name="twitter:description" content="整理、瀏覽娃娃造型的輕量圖書館。支援多條件篩選、尺寸搜尋、款式分類。">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════════
   全域重置與 CSS 變數
══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #fafaf8;
  --surface: #fff;
  --text:    #1a1a1a;
  --muted:   #999;
  --light:   #eee;
  --border:  #e8e8e4;
  --accent:  #1a1a1a;
}

html { font-size: 14px; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}


/* ══════════════════════════════════════════
   Header（固定置頂導覽列）
   三欄 grid：左(logo資訊) ／ 中(品牌名) ／ 右(操作按鈕)
   z-index 160 確保能壓過側邊欄遮罩（z-index: 140）
══════════════════════════════════════════ */
header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 40px;
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 160;
}

.header-left  { display: flex; align-items: center; gap: 20px; }
.header-logo  { text-align: center; }
.header-right { display: flex; justify-content: flex-end; align-items: center; gap: 16px; }

/* 期號文字（VOL.01）與英文副標 */
.header-issue { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: .12em; }
.logo-jp      { font-family: 'Shippori Mincho', serif; font-size: 20px; letter-spacing: .15em; font-weight: 500; }
.logo-en      { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .18em; color: var(--muted); display: block; margin-top: 2px; }

/* 導覽文字按鈕（INDEX / FILTER）*/
.nav-link {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .1em;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  transition: color .15s;
}
.nav-link:hover { color: var(--text); }

/* 新增造型按鈕（右上角黑底） */
.upload-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .12em;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 7px 14px;
  cursor: pointer;
  transition: opacity .15s;
}
.upload-btn:hover { opacity: .75; }


/* ══════════════════════════════════════════
   主佈局容器
   側邊欄改為浮動抽屜，主內容佔滿畫面寬度
══════════════════════════════════════════ */
.layout {
  display: block;
  min-height: calc(100vh - 60px);
}


/* ══════════════════════════════════════════
   側邊欄遮罩（點擊關閉側邊欄）
══════════════════════════════════════════ */
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 140;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.sidebar-overlay.open {
  opacity: 1;
  pointer-events: auto;
}


/* ══════════════════════════════════════════
   側邊欄（抽屜式浮動面板）
   預設隱藏在畫面左側外，開啟時滑入
══════════════════════════════════════════ */
.sidebar {
  position: fixed;
  top: 60px; /* 從 Header 正下方開始 */
  left: 0;
  width: 260px;
  height: calc(100vh - 60px);
  background: var(--surface);
  z-index: 150;
  box-shadow: 4px 0 12px rgba(0, 0, 0, 0.15);
  transform: translateX(-100%); /* 預設收合在畫面左側外 */
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 32px 24px 80px; /* 底部大留白，避免遮住 Clear All 按鈕 */
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar.open {
  transform: translateX(0); /* 滑入畫面 */
}

/* 手機版 Filter 按鈕（桌機版預設隱藏，由 media query 開啟）*/
.btn-filter-mobile { display: none; }


/* ══════════════════════════════════════════
   側邊欄內部元件
══════════════════════════════════════════ */

/* 篩選關鍵字搜尋框 */
.filter-search {
  width: 100%;
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 4px 0;
  font-size: 11px;
  font-family: 'Noto Sans TC', sans-serif;
  background: transparent;
  color: var(--text);
  outline: none;
  margin-bottom: 8px;
}
.filter-search:focus { border-bottom-color: var(--accent); }

/* 「顯示更多」展開按鈕 */
.show-more-btn {
  background: none;
  border: none;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  padding: 4px;
  font-family: 'DM Mono', monospace;
  letter-spacing: .06em;
  margin-top: 2px;
  text-align: left;
}
.show-more-btn:hover { color: var(--text); }

/* 篩選區塊、標籤與列表 */
.sidebar-block { margin-bottom: 32px; }
.sidebar-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .15em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: block;
}
.filter-list { display: flex; flex-direction: column; gap: 1px; }
.filter-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 4px;
  cursor: pointer;
  transition: background .1s;
  border-radius: 1px;
}
.filter-row:hover { background: var(--border); }
.filter-row input[type=checkbox] { width: 11px; height: 11px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
.filter-row .flabel { font-size: 12px; color: var(--text); flex: 1; cursor: pointer; }
.filter-row .cnt { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

/* 尺寸範圍輸入（min — max）*/
.size-row { display: flex; align-items: center; gap: 6px; }
.size-in {
  width: 52px;
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 4px 0;
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  background: transparent;
  color: var(--text);
  outline: none;
}
.size-in:focus { border-bottom-color: var(--accent); }
.size-sep { font-size: 10px; color: var(--muted); }

/* 清除所有篩選按鈕 */
.clear-all {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .1em;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  margin-top: 8px;
  display: block;
}
.clear-all:hover { color: var(--text); }


/* ══════════════════════════════════════════
   主內容區域
══════════════════════════════════════════ */

/* 內容外框：左右留白對齊 Header，大螢幕限制最大寬度 */
.main-wrap {
  width: 100%;
  padding: 0 40px 80px;
  max-width: 1600px;
  margin: 0 auto;
}

/* 頂部搜尋列與結果數量 */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
}
.search-box {
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 6px 0;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  background: transparent;
  color: var(--text);
  outline: none;
  width: 240px;
}
.search-box:focus        { border-bottom-color: var(--accent); }
.search-box::placeholder { color: var(--muted); }
.result-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: .08em; }


/* ══════════════════════════════════════════
   圖片畫廊（響應式 Grid）
══════════════════════════════════════════ */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 0;
}

/* 單一卡片
   - content-visibility: auto 讓瀏覽器跳過畫面外卡片的渲染，提升捲動效能
   - contain-intrinsic-size 提供佔位空間，避免捲動條跳動 */
.card {
  background: var(--surface);
  cursor: pointer;
  overflow: hidden;
  border-right:  1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  position: relative;
  content-visibility: auto;
  contain-intrinsic-size: 320px 380px;
}
.card:hover                  { background: #f5f5f2; }
.card:hover .card-img img    { transform: scale(1.05); }

/* 卡片圖片區
   - aspect-ratio 鎖定固定比例，讓每張卡片高度一致
   - object-fit: cover + object-position: center：置中裁切，左右均勻裁，上下不裁 */
.card-img                        { width: 100%; overflow: hidden; background: var(--light); }
.card-img img                    { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; transition: transform .4s ease; }
.card:nth-child(3n+1) .card-img  { aspect-ratio: 1;    }
.card:nth-child(3n+2) .card-img  { aspect-ratio: .85;  }
.card:nth-child(3n)   .card-img  { aspect-ratio: 1.1;  }

/* 無封面圖片時的佔位區塊 */
.card-no-img { display: flex; align-items: center; justify-content: center; background: var(--light); color: var(--border); font-size: 32px; }

/* 卡片文字資訊 */
.card-body  { padding: 14px 16px 16px; }
.card-num   { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: .1em; margin-bottom: 6px; }
.card-title { font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; letter-spacing: .03em; }
.card-meta  { font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: .02em; }

/* 標籤列 */
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
.tag      { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .08em; border: 1px solid var(--border); padding: 2px 6px; color: var(--muted); }

/* 無結果提示 */
.empty { grid-column: 1 / -1; text-align: center; padding: 80px; color: var(--muted); font-size: 13px; }


/* ══════════════════════════════════════════
   骨架屏（資料載入中的佔位動畫）
══════════════════════════════════════════ */
.skel .card-img  { aspect-ratio: 1; animation: sk 1.4s ease infinite; }
.skel .skel-line { height: 10px; border-radius: 0; margin-bottom: 8px; animation: sk 1.4s ease infinite; }
.skel .skel-line.s { width: 50%; }
@keyframes sk {
  0%, 100% { background: #eee; }
  50%       { background: #e4e4e0; }
}


/* ══════════════════════════════════════════
   Modal（通用彈出視窗）
══════════════════════════════════════════ */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(26, 26, 26, .65); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  width: 100%;
  max-width: 480px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 36px 32px;
  position: relative;
}
.modal-x { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 18px; color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace; line-height: 1; }
.modal-x:hover { color: var(--text); }
.modal-title { font-family: 'Shippori Mincho', serif; font-size: 18px; font-weight: 500; letter-spacing: .05em; margin-bottom: 28px; }

/* 表單欄位群組 */
.fg { margin-bottom: 16px; }
.fg label { display: block; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.fg input, .fg select, .fg textarea {
  width: 100%;
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 6px 0;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  background: transparent;
  color: var(--text);
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-bottom-color: var(--accent); }
.fg textarea { resize: vertical; min-height: 72px; border: 1px solid var(--border); padding: 8px; margin-top: 2px; }
.fg textarea:focus { border-color: var(--accent); }

/* 雙欄佈局（用於並排的輸入欄）*/
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* 圖片上傳區 */
.upload-zone {
  border: 1px solid var(--border);
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  margin-top: 2px;
}
.upload-zone:hover, .upload-zone.over { border-color: var(--accent); background: #f8f8f5; }
.upload-zone p    { font-size: 12px; color: var(--muted); }
.upload-zone .hint{ font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .08em; margin-top: 4px; }
.upload-prev      { width: 100%; max-height: 180px; object-fit: cover; margin-top: 10px; display: none; }

/* 送出按鈕與狀態訊息 */
.submit-btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .12em;
  cursor: pointer;
  margin-top: 12px;
  transition: opacity .15s;
}
.submit-btn:hover           { opacity: .75; }
.submit-btn:disabled        { opacity: .35; cursor: not-allowed; }
.status-msg                 { text-align: center; font-size: 11px; margin-top: 10px; min-height: 16px; font-family: 'DM Mono', monospace; letter-spacing: .04em; }
.status-msg.ok              { color: #3a7a56; }
.status-msg.err             { color: #b03030; }


/* ══════════════════════════════════════════
   Detail Modal（造型詳細資訊）
══════════════════════════════════════════ */
/* Detail Modal 圖片：固定高度＋完整顯示，不裁切任何部分，空白補背景色 */
.detail-img   { width: 100%; height: 400px; object-fit: contain; background: var(--light); display: block; margin-bottom: 24px; }
.detail-title { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 500; letter-spacing: .05em; margin-bottom: 20px; line-height: 1.4; }
.detail-rows  { display: flex; flex-direction: column; gap: 10px; }
.dr { display: flex; gap: 16px; font-size: 13px; }
.dk { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; min-width: 64px; padding-top: 2px; flex-shrink: 0; }


/* ══════════════════════════════════════════
   手機版響應式（≤640px）
══════════════════════════════════════════ */
@media (max-width: 640px) {
  header { padding: 0 20px; }

  /* 隱藏桌機版不需要的元素 */
  .header-issue, .logo-en { display: none; }
  .btn-index              { display: none; }
  .btn-filter-desktop     { display: none; }

  /* 顯示手機版 Filter 按鈕 */
  .btn-filter-mobile { display: block; }

  /* 手機版 Sidebar：覆蓋整個螢幕（含 Header），解決 iOS Safari 底部欄遮擋問題 */
  .sidebar {
    top: 0;
    width: 260px;
    height: 100vh;
    height: 100dvh; /* 100dvh 排除 Safari 底部導航列的遮擋 */
    padding: 48px 24px 80px;
    z-index: 200; /* 需高於 Header（z-index: 160） */
  }

  /* 遮罩也需高於 Header */
  .sidebar-overlay { z-index: 190; }

  /* 主內容區縮小留白 */
  .main-wrap  { padding: 0; }
  .top-bar    { padding: 14px 16px; }
  .search-box { width: 160px; }

  /* 畫廊改為固定雙排，圖片統一正方形比例，從頂部對齊 */
  .gallery                     { grid-template-columns: repeat(2, 1fr); }
  .card:nth-child(n) .card-img { aspect-ratio: 1; }
}


/* ══════════════════════════════════════════
   Autocomplete 下拉選單
══════════════════════════════════════════ */
.ac-list {
  position: absolute;
  top: 100%; left: 0; right: 0;
  background: #fff;
  border: 1px solid var(--border);
  z-index: 50;
  max-height: 200px;
  overflow-y: auto;
  display: none;
  box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}
.ac-item { padding: 9px 12px; font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--text); }
.ac-item:last-child              { border-bottom: none; }
.ac-item:hover, .ac-item.focused { background: var(--bg); }
.ac-item b                       { font-weight: 600; }

</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     Header
══════════════════════════════════════════ -->
<header>
  <div class="header-left">
    <span class="header-issue">VOL.01</span>
    <!-- 桌機：回到首頁（清除篩選）；手機：開啟 Filter 抽屜 -->
    <button class="nav-link btn-index"         onclick="clearFilters()">INDEX</button>
    <button class="nav-link btn-filter-mobile" onclick="toggleSidebar()">FILTER</button>
  </div>

  <div class="header-logo">
    <span class="logo-jp">娃衣圖書館</span>
    <span class="logo-en">PLUSHES OUTFIT ARCHIVE</span>
  </div>

  <div class="header-right">
    <button class="nav-link btn-filter-desktop" id="filterToggle" onclick="toggleSidebar()">FILTER</button>
    <button class="upload-btn" onclick="openUpload()">SUBMIT</button>
  </div>
</header>


<!-- ══════════════════════════════════════════
     主佈局
══════════════════════════════════════════ -->
<div class="layout">

  <!-- 點擊遮罩可關閉側邊欄 -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- 篩選側邊欄 -->
  <aside class="sidebar" id="sidebar">

    <!-- 款式篩選 -->
    <div class="sidebar-block">
      <span class="sidebar-label">款式</span>
      <input class="filter-search" type="text" id="fs-style" placeholder="搜尋..." oninput="filterSearch('fl-style', this.value)">
      <div class="filter-list" id="fl-style"></div>
    </div>

    <!-- 娃娃篩選（chip） -->
    <div class="sidebar-block">
      <span class="sidebar-label">試穿娃娃</span>
      <input class="filter-search" type="text" id="fs-doll" placeholder="搜尋..." oninput="filterDollChips(this.value)">
      <div id="fl-doll" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;max-height:160px;overflow-y:auto;"></div>
    </div>

    <!-- 尺寸範圍篩選 -->
    <div class="sidebar-block">
      <span class="sidebar-label">尺寸 cm</span>
      <div class="size-row">
        <input class="size-in" type="number" id="sz-min" placeholder="min" oninput="applyFilters()">
        <span class="size-sep">—</span>
        <input class="size-in" type="number" id="sz-max" placeholder="max" oninput="applyFilters()">
      </div>
    </div>

    <!-- 標籤篩選 -->
    <div class="sidebar-block">
      <span class="sidebar-label">標籤</span>
      <input class="filter-search" type="text" id="fs-tags" placeholder="搜尋..." oninput="filterSearch('fl-tags', this.value)">
      <div class="filter-list" id="fl-tags"></div>
    </div>

    <button class="clear-all" onclick="clearFilters()">CLEAR ALL</button>
  </aside>

<script>
/* ══════════════════════════════════════════
   後端設定（Supabase + Notion Edge Function）
══════════════════════════════════════════ */
const SB_URL = "https://jakxuqbfplyohjshqnlp.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impha3h1cWJmcGx5b2hqc2hxbmxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDUxOTksImV4cCI6MjA5MzcyMTE5OX0.PtSj2MKFARo88C0Hp4HTRDobanaI2xPSG3goPmNkCLM";
const EDGE   = `${SB_URL}/functions/v1/notion-proxy`;   // Notion CRUD 的 Edge Function
const DB     = `${SB_URL}/rest/v1/outfits`;                // Supabase DB REST API
const BUCKET = `${SB_URL}/storage/v1/object/public/outfit-photos`; // Storage 公開圖片根路徑

/* ══════════════════════════════════════════
   全域狀態
══════════════════════════════════════════ */
let items   = [];          // 從 Notion 載入的所有造型資料
let allDolls  = [];        // dolls table 完整清單
let allStyles = [];        // styles table 完整清單
let allTags   = [];        // tags table 完整清單
let selFile = null;        // 使用者選取待上傳的圖片檔案

// 目前啟用的篩選條件（Set 結構，方便新增／刪除）
let aStyles = new Set();
let aDolls  = new Set();
let aTags   = new Set();

// 共用 API 請求標頭
const hdrs = {
  'Content-Type': 'application/json',
  'Authorization': `Bearer ${SB_KEY}`
};


/* ══════════════════════════════════════════
   資料載入：從 Supabase DB 讀取（快取）
══════════════════════════════════════════ */
async function load() {
  try {
    // 從 Supabase DB 讀（比 Notion API 快很多）
    const r = await fetch(
      DB + '?order=created_at.desc&limit=100',
      { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
    );
    const rows = await r.json();

    items = (rows || []).map((row, i) => {
      let thumbCover = row.cover;
      return {
        idx:       String(i + 1).padStart(3, '0'),
        id:        row.id,
        name:      row.name || 'Untitled',
        doll:      row.doll || [],
        style:     row.style || [],
        size:      row.size || null,
        tags:      row.tags || [],
        note:      row.note || '',
        shop:      row.shop || '',
        origin:    row.origin || '',
        cover:     thumbCover,
        fullCover: row.cover,
      };
    });

    // 從 Supabase DB 抓三個清單 table
    try {
      const [dr, sr, tr] = await Promise.all([
        fetch(`${SB_URL}/rest/v1/dolls?order=name.asc`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }),
        fetch(`${SB_URL}/rest/v1/styles?order=name.asc`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }),
        fetch(`${SB_URL}/rest/v1/tags?order=name.asc`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }),
      ]);
      allDolls  = (await dr.json()).map(r => r.name);
      allStyles = (await sr.json()).map(r => r.name);
      allTags   = (await tr.json()).map(r => r.name);
    } catch (_) {}

    buildFilters();
    applyFilters();
  } catch (e) {
    document.getElementById('gallery').innerHTML = `
      <div class="empty" style="padding:80px 20px; line-height:2;">
        <div style="font-size:24px; margin-bottom:16px;">🔧</div>
        <div style="font-family:'Shippori Mincho',serif; font-size:16px; margin-bottom:8px;">
          網站維修中
        </div>
        <div style="font-size:12px; color:var(--muted); margin-bottom:20px;">
          目前無法連線到資料庫，請稍後再試
        </div>
        <a href="https://enormous-quart-696.notion.site/plushes-outfit-database?v=359bbd5f4aff8029a44e000c82d4b321"
           target="_blank"
           rel="noopener"
           style="
             font-family:'DM Mono',monospace;
             font-size:10px;
             letter-spacing:.12em;
             color:var(--text);
             text-decoration:none;
             border-bottom: 1px solid var(--border);
             padding-bottom:2px;
             transition: border-color .15s;
           "
           onmouseenter="this.style.borderColor='var(--text)'"
           onmouseleave="this.style.borderColor='var(--border)'">
          前往 Notion 原始資料庫 →
        </a>
      </div>
    `;
    document.getElementById('rcount').textContent = 'error';
  }
}


/* ══════════════════════════════════════════
   篩選器建構：依資料動態產生 Checkbox 列表
══════════════════════════════════════════ */
function buildFilters() {
  // 款式
  const styles = [...new Set(items.flatMap(i => i.style).filter(Boolean))].sort();
  renderCBs('fl-style', styles, aStyles);

  // 娃娃（chip）：優先用 Notion 完整選單，沒有才 fallback 造型資料
  const dolls = allDolls.length
    ? allDolls
    : [...new Set(items.flatMap(i => i.doll).filter(Boolean))].sort();
  renderDollChips(dolls);

  // 標籤（依使用頻率由高至低排序）
  const tm = {};
  items.forEach(i => i.tags.forEach(t => tm[t] = (tm[t] || 0) + 1));
  const tags = Object.keys(tm).sort((a, b) => tm[b] - tm[a]);
  renderCBs('fl-tags', tags, aTags, tm);
}

/* 娃娃 chip 渲染 */
function renderDollChips(dolls) {
  const el = document.getElementById('fl-doll');
  if (!dolls.length) {
    el.innerHTML = '<span style="font-size:11px;color:var(--muted)">—</span>';
    return;
  }
  el.innerHTML = dolls.map(v => {
    const active = aDolls.has(v);
    return `<button
      onclick="togChip('${v.replace(/'/g, "\'")}')"
      style="
        font-family:'DM Mono',monospace;
        font-size:9px;
        letter-spacing:.08em;
        border: 1px solid ${active ? 'var(--accent)' : 'var(--border)'};
        background: ${active ? 'var(--accent)' : 'transparent'};
        color: ${active ? '#fff' : 'var(--text)'};
        padding: 4px 10px;
        cursor: pointer;
        transition: all .15s;
        white-space: nowrap;
      "
    >${v}</button>`;
  }).join('');
}

function togChip(val) {
  aDolls.has(val) ? aDolls.delete(val) : aDolls.add(val);
  const q = document.getElementById('fs-doll')?.value || '';
  filterDollChips(q);
  applyFilters();
}

function filterDollChips(q) {
  const all = allDolls.length
    ? allDolls
    : [...new Set(items.flatMap(i => i.doll).filter(Boolean))].sort();
  const filtered = q ? all.filter(d => d.toLowerCase().includes(q.toLowerCase())) : all;
  renderDollChips(filtered);
}

/* 產生單一 Checkbox 列（label + count）*/
function makeRow(id, v, activeSet, cmap) {
  const checked = activeSet.has(v) ? 'checked' : '';
  const cnt     = cmap ? '<span class="cnt">' + cmap[v] + '</span>' : '';
  return '<label class="filter-row">'
    + '<input type="checkbox" value="' + v + '" ' + checked
    + ' onchange="tog(\'' + id + '\',\'' + v.replace(/'/g, "\\'") + '\',this.checked)">'
    + '<span class="flabel">' + v + '</span>'
    + cnt
    + '</label>';
}

/* 渲染 Checkbox 列表，預設最多顯示 6 項，其餘收合 */
function renderCBs(id, vals, activeSet, cmap, maxShow = 6) {
  const el = document.getElementById(id);
  if (!vals.length) { el.innerHTML = '<span style="font-size:11px;color:var(--muted)">—</span>'; return; }

  const shown = vals.slice(0, maxShow);
  const rest  = vals.slice(maxShow);

  let html = shown.map(v => makeRow(id, v, activeSet, cmap)).join('');
  if (rest.length) {
    html += '<div id="' + id + '-more" style="display:none">'
          + rest.map(v => makeRow(id, v, activeSet, cmap)).join('')
          + '</div>';
    html += '<button class="show-more-btn" onclick="toggleMore(\'' + id + '-more\',this)">+ ' + rest.length + ' 更多</button>';
  }
  el.innerHTML = html;
}

/* 展開 / 收合「更多」區塊 */
function toggleMore(id, btn) {
  const el     = document.getElementById(id);
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  btn.textContent  = hidden ? '− 收起' : '+ ' + el.children.length + ' 更多';
}

/* 即時搜尋篩選列表（展開隱藏項目並隱藏不符合者）*/
function filterSearch(listId, q) {
  const container = document.getElementById(listId);
  const ql        = q.toLowerCase();
  const moreDiv   = document.getElementById(listId + '-more');
  const moreBtn   = container.querySelector('.show-more-btn');

  if (q) {
    // 搜尋中：展開所有隱藏項目，隱藏「更多」按鈕
    if (moreDiv) moreDiv.style.display = '';
    if (moreBtn) moreBtn.style.display = 'none';
  } else {
    // 清空：恢復預設收合狀態
    if (moreDiv) moreDiv.style.display = 'none';
    if (moreBtn) {
      const count = moreDiv ? moreDiv.querySelectorAll('.filter-row').length : 0;
      moreBtn.textContent  = '+ ' + count + ' 更多';
      moreBtn.style.display = '';
    }
  }

  // 逐列比對，隱藏不包含關鍵字的項目
  container.querySelectorAll('.filter-row').forEach(row => {
    const label = row.querySelector('.flabel');
    if (!label) return;
    row.style.display = label.textContent.toLowerCase().includes(ql) ? '' : 'none';
  });
}

/* 切換 Checkbox 勾選狀態並重新篩選 */
function tog(gid, val, on) {
  const m = { 'fl-style': aStyles, 'fl-doll': aDolls, 'fl-tags': aTags };
  on ? m[gid].add(val) : m[gid].delete(val);
  applyFilters();
}


/* ══════════════════════════════════════════
   篩選邏輯（防抖 60ms，避免頻繁重繪）
══════════════════════════════════════════ */
let _ft = null;
function applyFilters() {
  if (_ft) clearTimeout(_ft);
  _ft = setTimeout(_doFilter, 60);
}

function _doFilter() {
  const q    = (document.getElementById('searchQ').value || '').toLowerCase();
  const sMin = parseFloat(document.getElementById('sz-min').value) || null;
  const sMax = parseFloat(document.getElementById('sz-max').value) || null;

  const f = items.filter(item => {
    // 關鍵字搜尋（名稱或娃娃名）
    if (q && !item.name.toLowerCase().includes(q) && !item.doll.join('').toLowerCase().includes(q)) return false;
    // 款式篩選（任一款式符合即通過）
    if (aStyles.size && ![...aStyles].some(s => item.style.includes(s))) return false;
    // 娃娃篩選（任一娃娃符合即通過）
    if (aDolls.size  && ![...aDolls].some(d => item.doll.includes(d)))   return false;
    // 標籤篩選（必須包含所有選取的標籤）
    if (aTags.size   && ![...aTags].every(t => item.tags.includes(t)))   return false;
    // 尺寸範圍篩選
    if (sMin !== null && (item.size === null || item.size < sMin)) return false;
    if (sMax !== null && (item.size === null || item.size > sMax)) return false;
    return true;
  });

  document.getElementById('rcount').textContent = `${f.length} ITEMS`;

  const g = document.getElementById('gallery');
  if (!f.length) { g.innerHTML = '<div class="empty">No results found.</div>'; return; }

  g.innerHTML = f.map(item => `
    <div class="card" onclick='openDetail(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
      <div class="card-img" style="aspect-ratio:1">
        ${item.cover
          ? `<img src="${item.cover}" alt="${item.name}" loading="lazy" decoding="async" width="220" height="220" style="width:100%;height:100%;">`
          : `<div class="card-no-img" style="aspect-ratio:1">○</div>`
        }
      </div>
      <div class="card-body">
        <div class="card-num">No.${item.idx}</div>
        <div class="card-title">${item.name}</div>
        <div class="card-meta">${[item.doll.join(' / '), item.size ? item.size + 'cm' : ''].filter(v => v).join('  ·  ')}</div>
        <div class="tag-list">
          ${item.style.map(t => `<span class="tag" style="border-color:var(--accent);color:var(--accent)">${t}</span>`).join('')}
          ${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

/* 清除所有篩選條件並重新載入 */
function clearFilters() {
  aStyles.clear(); aDolls.clear(); aTags.clear();
  document.getElementById('sz-min').value  = '';
  document.getElementById('sz-max').value  = '';
  document.getElementById('searchQ').value = '';
  document.querySelectorAll('.filter-row input').forEach(c => c.checked = false);
  filterDollChips('');
  applyFilters();
}


/* ══════════════════════════════════════════
   側邊欄開關
══════════════════════════════════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}


/* ══════════════════════════════════════════
   Detail Modal：顯示造型詳細資訊
══════════════════════════════════════════ */
function openDetail(item) {
  document.getElementById('detContent').innerHTML = `
    ${item.fullCover ? `<img class="detail-img" src="${item.fullCover}" alt="${item.name}">` : ''}
    <div class="detail-title">${item.name}</div>
    <div class="detail-rows">
      ${item.doll.length   ? `<div class="dr"><span class="dk">娃娃</span><span>${item.doll.join(', ')}</span></div>` : ''}
      ${item.style.length  ? `<div class="dr"><span class="dk">款式</span><span>${item.style.join(', ')}</span></div>` : ''}
      ${item.size          ? `<div class="dr"><span class="dk">尺寸</span><span>${item.size} cm</span></div>` : ''}
      ${item.origin        ? `<div class="dr"><span class="dk">產地</span><span>${item.origin}</span></div>` : ''}
      ${item.tags.length   ? `<div class="dr"><span class="dk">標籤</span><div class="tag-list">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div></div>` : ''}
      ${item.note ? `<div class="dr"><span class="dk">備註</span><span style="line-height:1.6">${item.note}</span></div>` : ''}
    </div>
    ${item.shop && item.shop.startsWith('http') ? `
      <a href="${item.shop}" target="_blank" rel="noopener" style="
        display:block;
        margin-top:24px;
        font-family:'DM Mono',monospace;
        font-size:10px;
        letter-spacing:.14em;
        color:#fff;
        background:var(--accent);
        text-decoration:none;
        padding:12px;
        text-align:center;
        transition:opacity .15s;
      " onmouseenter="this.style.opacity='.7'" onmouseleave="this.style.opacity='1'">SHOP →</a>
    ` : ''}
  `;
  document.getElementById('detModal').classList.add('open');
}


/* ══════════════════════════════════════════
   Upload Modal：開關
══════════════════════════════════════════ */
function openUpload()  { document.getElementById('upModal').classList.add('open'); }
function closeUpload() { document.getElementById('upModal').classList.remove('open'); }


/* ══════════════════════════════════════════
   圖片選取 & 拖曳上傳
══════════════════════════════════════════ */
function handleFile(f) {
  if (!f) return;
  selFile = f;
  const r = new FileReader();
  r.onload = e => {
    const p = document.getElementById('upPreview');
    p.src = e.target.result;
    p.style.display = 'block';
    document.getElementById('upText').textContent = f.name;
  };
  r.readAsDataURL(f);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upZone').classList.remove('over');
  handleFile(e.dataTransfer.files[0]);
}


/* ══════════════════════════════════════════
   圖片壓縮（上傳前先縮圖，節省儲存與流量）
   - maxSize：最長邊上限（預設 800px）
   - 輸出格式：WebP，品質 80%
══════════════════════════════════════════ */
async function compressImage(file, maxSize = 800) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let width  = img.width;
        let height = img.height;

        // 等比例縮小（超過 maxSize 才縮）
        if (width > height && width > maxSize) {
          height *= maxSize / width;
          width   = maxSize;
        } else if (height > maxSize) {
          width  *= maxSize / height;
          height  = maxSize;
        }

        const canvas = document.createElement('canvas');
        canvas.width  = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);

        // 轉換為 WebP，品質 80%
        canvas.toBlob(
          blob => resolve(new File([blob], file.name.replace(/\.[^/.]+$/, '') + '.webp', { type: 'image/webp' })),
          'image/webp',
          0.8
        );
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}


/* ══════════════════════════════════════════
   圖片上傳至 Supabase Storage
══════════════════════════════════════════ */
async function uploadImg(file) {
  const ext   = file.name.split('.').pop().toLowerCase();
  const fname = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

  const res = await fetch(`${SB_URL}/storage/v1/object/outfit-photos/${fname}`, {
    method:  'POST',
    headers: { 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': file.type, 'x-upsert': 'true' },
    body:    file,
  });

  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  return `${BUCKET}/${fname}`;
}


/* ══════════════════════════════════════════
   表單送出：壓縮圖片 → 上傳 → 寫入 Notion
══════════════════════════════════════════ */
async function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  if (!name)    { setStatus('請填寫造型名稱', 'err'); return; }
  if (!selFile) { setStatus('請選擇照片',     'err'); return; }

  const btn = document.getElementById('subBtn');
  btn.disabled = true;

  try {
    setStatus('Compressing image...', '');
    const compressedFile = await compressImage(selFile);

    setStatus('Uploading image...', '');
    const imageUrl = await uploadImg(compressedFile);

    setStatus('Saving...', '');

    // 解析標籤（逗號或中文逗號分隔），並去除重複值
    const tagsRaw = document.getElementById('f-tags').value;
    const tags    = tagsRaw ? [...new Set(tagsRaw.split(/[,，]/).map(t => t.trim()).filter(Boolean))] : [];
    const shop    = document.getElementById('f-shop').value.trim();
    const doll    = [...new Set(document.getElementById('f-doll').value.split(/[,，]/).map(s => s.trim()).filter(Boolean))];
    const style   = [...new Set(document.getElementById('f-style').value.split(/[,，]/).map(s => s.trim()).filter(Boolean))];
    const size    = document.getElementById('f-size').value;
    const note    = document.getElementById('f-note').value.trim();
    const origin  = document.getElementById('f-origin').value;

    // 寫入 Supabase DB（馬上出現在網站）
    const res = await fetch(DB, {
      method:  'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Prefer': 'return=representation',
      },
      body: JSON.stringify({
        name,
        cover:  imageUrl,
        doll:   doll.length ? doll : null,
        style,
        size:   size ? Number(size) : null,
        tags,
        note:   note || null,
        shop:   shop.startsWith('http') ? shop : null,
        origin: origin || null,
      })
    });

    const rd = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(rd));

    // 非同步把新的 doll/style/tags 寫進清單 table（背景執行）
    doll.forEach(d => {
      fetch(`${SB_URL}/rest/v1/dolls`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'resolution=ignore-duplicates' },
        body: JSON.stringify({ name: d })
      }).catch(() => {});
    });
    style.forEach(s => {
      fetch(`${SB_URL}/rest/v1/styles`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'resolution=ignore-duplicates' },
        body: JSON.stringify({ name: s })
      }).catch(() => {});
    });
    tags.forEach(t => {
      fetch(`${SB_URL}/rest/v1/tags`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'resolution=ignore-duplicates' },
        body: JSON.stringify({ name: t })
      }).catch(() => {});
    });

    // 原本是 fire-and-forget，改為等待並取回 notion_id
    try {
      const notionRes = await fetch(EDGE, {
        method:  'POST',
        headers: hdrs,
        body: JSON.stringify({
          action: 'create',
          data: { name, imageUrl, dolls: doll, style, size, tags, note, shop: shop.startsWith('http') ? shop : '', origin }
        })
      });
      const notionJson = await notionRes.json();
      const notionId = notionJson?.id;   // Notion 回傳的 page ID

      // 用 notion_id 更新剛才寫入的那筆 Supabase 資料
      if (notionId && rd[0]?.id) {
        await fetch(`${DB}?id=eq.${rd[0].id}`, {
          method:  'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
          },
          body: JSON.stringify({ notion_id: notionId })
        });
      }
    } catch (_) {
      // Notion 備份失敗不影響主流程
    }

    setStatus('Done ✓', 'ok');
    setTimeout(() => { closeUpload(); resetForm(); load(); }, 1200);

  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}


/* ══════════════════════════════════════════
   Autocomplete（輸入框即時建議）
   - ac-name / ac-doll：單一選取
   - ac-style / ac-tags：逗號分隔多選，補全最後一個 token
══════════════════════════════════════════ */
const AC_SOURCES = {
  'ac-name':  () => [...new Set(items.map(i => i.name).filter(Boolean))].sort(),
  'ac-doll':  () => allDolls.length ? allDolls : [...new Set(items.flatMap(i => i.doll).filter(Boolean))].sort(),
  'ac-style': () => allStyles.length ? allStyles : [...new Set(items.flatMap(i => i.style).filter(Boolean))].sort(),
  'ac-tags':  () => {
    if (allTags.length) return allTags;
    const tm = {};
    items.forEach(i => i.tags.forEach(t => tm[t] = (tm[t] || 0) + 1));
    return Object.keys(tm).sort((a, b) => tm[b] - tm[a]);
  },
};

function showAC(input, listId) {
  const rawQ  = input.value;
  const isMulti = listId === 'ac-tags' || listId === 'ac-style' || listId === 'ac-doll'; // 多選欄位補全最後一個 token
  const q     = isMulti ? rawQ.split(/[,，]/).pop().trim().toLowerCase() : rawQ.trim().toLowerCase();
  const list  = document.getElementById(listId);

  if (!q) { list.style.display = 'none'; return; }

  // 多選欄位：過濾掉已經選過的值
  const existing = isMulti ? rawQ.split(/[,，]/).map(s => s.trim()).filter(Boolean).slice(0, -1) : [];
  const opts = AC_SOURCES[listId]().filter(v => v.toLowerCase().includes(q) && !existing.includes(v)).slice(0, 10);
  if (!opts.length) { list.style.display = 'none'; return; }

  list.innerHTML = opts.map(v => {
    const safe  = v.replace(/&/g, '&amp;').replace(/</g, '&lt;');
    const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const hi    = safe.replace(new RegExp('(' + safeQ + ')', 'gi'), '<b>$1</b>'); // 高亮匹配字元
    return '<div class="ac-item" onmousedown="pickAC(event,\'' + input.id + '\',\'' + listId + '\',\'' + v.replace(/'/g, "\\'") + '\')">' + hi + '</div>';
  }).join('');
  list.style.display = 'block';
}

/* 選取 Autocomplete 建議項目 */
function pickAC(e, inputId, listId, val) {
  e.preventDefault();
  const input = document.getElementById(inputId);

  if (listId === 'ac-tags' || listId === 'ac-style' || listId === 'ac-doll') {
    // 逗號前面已確認的值才算「已選過」，最後一個輸入中的 token 不算
    const parts = input.value.split(',');
    const confirmed = parts.slice(0, -1).map(s => s.trim()).filter(Boolean);
    if (confirmed.includes(val)) {
      // 已存在：只清掉最後一個未完成的 token
      parts[parts.length - 1] = '';
      input.value = parts.join(', ').replace(/,\s*$/, '') + ', ';
    } else {
      // 正常補全：替換最後一個逗號後的 token
      parts[parts.length - 1] = ' ' + val;
      input.value = parts.join(', ').replace(/^\s*,\s*/, '') + ', ';
    }
  } else {
    input.value = val;
  }

  document.getElementById(listId).style.display = 'none';
  input.focus();
}

/* 點擊其他地方時關閉所有 Autocomplete 列表 */
document.addEventListener('click', () => {
  ['ac-name', 'ac-doll', 'ac-style', 'ac-tags'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
});

function setStatus(msg, cls) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className   = 'status-msg ' + (cls || '');
}

/* 重置 Upload 表單至初始狀態 */
function resetForm() {
  ['f-name', 'f-doll', 'f-style', 'f-size', 'f-tags', 'f-shop', 'f-note'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-origin').value         = '';
  document.getElementById('upPreview').style.display = 'none';
  document.getElementById('upText').textContent      = '點擊或拖曳上傳';
  selFile = null;
  setStatus('', '');
}
