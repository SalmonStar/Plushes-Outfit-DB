<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>娃衣圖書館</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f8;--surface:#fff;--surface2:#f2f2f2;
  --text:#111;--muted:#888;--border:#e0e0e0;
  --accent:#111;--accent-inv:#fff;
}
body{font-family:'DM Sans','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:500;letter-spacing:.02em}
.logo-sub{font-size:11px;color:var(--muted);margin-left:10px;font-weight:300;letter-spacing:.05em}
.upload-btn{background:var(--accent);color:var(--accent-inv);border:none;padding:7px 16px;font-size:12px;font-family:'DM Sans','Noto Sans TC',sans-serif;letter-spacing:.04em;cursor:pointer;transition:opacity .15s}
.upload-btn:hover{opacity:.75}
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:24px 20px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sidebar-section{margin-bottom:28px}
.sidebar-title{font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 6px;border-radius:2px;transition:background .1s;user-select:none}
.filter-item:hover{background:var(--surface2)}
.filter-item input[type=checkbox]{width:13px;height:13px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.filter-item span.flabel{font-size:13px;cursor:pointer;color:var(--text);flex:1}
.filter-item .count{font-size:11px;color:var(--muted)}
.size-inputs{display:flex;align-items:center;gap:6px}
.size-input{width:60px;border:1px solid var(--border);padding:5px 8px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none}
.size-input:focus{border-color:var(--accent)}
.size-sep{font-size:11px;color:var(--muted)}
.clear-btn{background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;padding:0;text-decoration:underline;margin-top:8px;display:block}
.clear-btn:hover{color:var(--text)}
.search-wrap{padding:16px 24px 0;max-width:400px}
.search-input{width:100%;border:1px solid var(--border);padding:8px 12px;font-size:13px;font-family:'DM Sans','Noto Sans TC',sans-serif;background:var(--surface);color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent)}
main{flex:1;min-width:0;padding:20px 24px}
.result-bar{font-size:12px;color:var(--muted);margin-bottom:16px;letter-spacing:.02em}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--border)}
.card{background:var(--surface);cursor:pointer;overflow:hidden;transition:opacity .15s}
.card:hover{opacity:.8}
.card-img{width:100%;aspect-ratio:1;overflow:hidden;background:var(--surface2)}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-img img{transform:scale(1.04)}
.card-no-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--muted);font-size:28px}
.card-body{padding:10px 12px 12px}
.card-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:5px}
.tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;border:1px solid var(--border);padding:1px 6px;color:var(--muted);letter-spacing:.02em}
.empty{grid-column:1/-1;text-align:center;padding:80px 24px;color:var(--muted)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:28px;position:relative}
.modal-close{position:absolute;top:18px;right:18px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:16px;font-weight:500;letter-spacing:.03em;margin-bottom:22px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--border);padding:8px 10px;font-size:13px;font-family:'DM Sans','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);outline:none;border-radius:0;-webkit-appearance:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:72px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.upload-area{border:1px dashed var(--border);padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--bg)}
.upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:var(--surface2)}
.upload-area p{font-size:12px;color:var(--muted)}
.upload-preview{width:100%;max-height:200px;object-fit:cover;margin-top:10px;display:none}
.submit-btn{width:100%;background:var(--accent);color:var(--accent-inv);border:none;padding:11px;font-size:13px;font-family:'DM Sans','Noto Sans TC',sans-serif;letter-spacing:.06em;cursor:pointer;margin-top:10px;transition:opacity .15s}
.submit-btn:hover{opacity:.75}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.status{text-align:center;font-size:12px;margin-top:10px;min-height:18px;letter-spacing:.02em}
.status.ok{color:#2a7a4f}
.status.err{color:#c0392b}
.detail-cover{width:100%;max-height:340px;object-fit:cover;display:block;margin-bottom:20px}
.detail-name{font-size:18px;font-weight:500;margin-bottom:16px;letter-spacing:.02em}
.detail-rows{display:flex;flex-direction:column;gap:9px}
.detail-row{display:flex;gap:12px;font-size:13px;align-items:flex-start}
.dl{color:var(--muted);min-width:72px;flex-shrink:0;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding-top:1px}
.skel-card{overflow:hidden;background:var(--surface)}
.skel-img{width:100%;aspect-ratio:1;background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite}
.skel-body{padding:10px 12px 12px}
.skel-line{height:11px;border-radius:2px;margin-bottom:7px;background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite}
.skel-line.short{width:55%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:640px){.sidebar{display:none}.search-wrap{padding:12px 16px 0}main{padding:16px}.gallery{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div>
    <span class="logo">娃衣圖書館</span>
    <span class="logo-sub">Plushes Outfit Gallery</span>
  </div>
  <button class="upload-btn" onclick="openUpload()">+ 上傳造型</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">款式</div>
      <div class="filter-group" id="filter-style"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">試穿娃娃</div>
      <div class="filter-group" id="filter-doll"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">娃娃尺寸 (cm)</div>
      <div class="size-inputs">
        <input class="size-input" type="number" id="size-min" placeholder="最小" oninput="applyFilters()">
        <span class="size-sep">—</span>
        <input class="size-input" type="number" id="size-max" placeholder="最大" oninput="applyFilters()">
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">標籤</div>
      <div class="filter-group" id="filter-tags"></div>
    </div>
    <button class="clear-btn" onclick="clearFilters()">清除所有篩選</button>
  </aside>

  <div style="flex:1;min-width:0">
    <div class="search-wrap">
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋造型名稱或娃娃..." oninput="applyFilters()">
    </div>
    <main>
      <div class="result-bar" id="resultBar">載入中...</div>
      <div class="gallery" id="gallery">
        ${Array(9).fill(0).map(()=>'<div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div></div></div>').join('')}
      </div>
    </main>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-bg" id="uploadModal">
  <div class="modal">
    <button class="modal-close" onclick="closeUpload()">×</button>
    <h2>上傳造型</h2>
    <div class="form-group">
      <label>造型名稱 *</label>
      <input type="text" id="f-name" placeholder="例：台大米白帽T">
    </div>
    <div class="form-group">
      <label>照片 *</label>
      <div class="upload-area" id="uploadArea"
        onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')"
        ondrop="handleDrop(event)">
        <p id="uploadText">點擊或拖曳上傳照片</p>
        <p style="font-size:11px;margin-top:3px">JPG / PNG</p>
        <img class="upload-preview" id="preview" alt="預覽">
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
    </div>
    <div class="two-col">
      <div class="form-group">
        <label>試穿娃娃</label>
        <input type="text" id="f-doll" placeholder="例：SUNSUN玩偶">
      </div>
      <div class="form-group">
        <label>款式</label>
        <select id="f-style"><option value="">選擇款式</option></select>
      </div>
    </div>
    <div class="two-col">
      <div class="form-group">
        <label>娃娃尺寸 (cm)</label>
        <input type="number" id="f-size" placeholder="例：28">
      </div>
      <div class="form-group">
        <label>產地</label>
        <select id="f-origin">
          <option value="">選擇產地</option>
          <option>台灣</option><option>日本</option><option>韓國</option><option>中國</option><option>不確定</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>標籤（用逗號分隔）</label>
      <input type="text" id="f-tags" placeholder="例：休閒, 日系, 可愛">
    </div>
    <div class="form-group">
      <label>商家連結或名稱</label>
      <input type="text" id="f-shop" placeholder="https://... 或 店名">
    </div>
    <div class="form-group">
      <label>備註</label>
      <textarea id="f-note" placeholder="尺寸建議、穿搭心得..."></textarea>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">上傳分享</button>
    <div class="status" id="statusMsg"></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const SUPABASE_URL="https://jakxuqbfplyohjshqnlp.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impha3h1cWJmcGx5b2hqc2hxbmxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDUxOTksImV4cCI6MjA5MzcyMTE5OX0.PtSj2MKFARo88C0Hp4HTRDobanaI2xPSG3goPmNkCLM";
const EDGE_URL=`${SUPABASE_URL}/functions/v1/notion-proxy`;
const BUCKET_URL=`${SUPABASE_URL}/storage/v1/object/public/outfit-photos`;

let allItems=[],selectedFile=null;
let activeStyles=new Set(),activeDolls=new Set(),activeTags=new Set();

async function loadItems(){
  try{
    const res=await fetch(EDGE_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({action:'list'})});
    const data=await res.json();
    allItems=(data.results||[]).map(page=>{
      const p=page.properties;
      return{
        id:page.id,
        name:p['名稱']?.title?.[0]?.text?.content||'未命名',
        doll:p['試穿娃娃']?.select?.name||'',
        style:p['款式']?.select?.name||'',
        size:p['娃娃尺寸']?.number||null,
        tags:p['標籤']?.multi_select?.map(t=>t.name)||[],
        note:p['備註']?.rich_text?.[0]?.text?.content||'',
        shop:p['商家連結或名稱']?.url||'',
        origin:p['產地']?.select?.name||'',
        cover:page.cover?.external?.url||page.cover?.file?.url||null,
      };
    });
    buildFilters();
    applyFilters();
  }catch(e){
    document.getElementById('gallery').innerHTML='<div class="empty">載入失敗，請確認設定</div>';
    document.getElementById('resultBar').textContent='';
  }
}

function buildFilters(){
  const styles=[...new Set(allItems.map(i=>i.style).filter(Boolean))].sort();
  renderCBs('filter-style',styles,activeStyles);
  const sel=document.getElementById('f-style');
  sel.innerHTML='<option value="">選擇款式</option>'+styles.map(s=>`<option>${s}</option>`).join('');

  const dolls=[...new Set(allItems.map(i=>i.doll).filter(Boolean))].sort();
  renderCBs('filter-doll',dolls,activeDolls);

  const tagMap={};
  allItems.forEach(i=>i.tags.forEach(t=>tagMap[t]=(tagMap[t]||0)+1));
  const tags=Object.keys(tagMap).sort((a,b)=>tagMap[b]-tagMap[a]);
  renderCBs('filter-tags',tags,activeTags,tagMap);
}

function renderCBs(id,values,activeSet,countMap){
  const el=document.getElementById(id);
  if(!values.length){el.innerHTML='<span style="font-size:12px;color:var(--muted)">暫無資料</span>';return;}
  el.innerHTML=values.map(v=>`
    <label class="filter-item">
      <input type="checkbox" value="${v}" ${activeSet.has(v)?'checked':''} onchange="toggleFilter('${id}','${v}',this.checked)">
      <span class="flabel">${v}</span>
      ${countMap?`<span class="count">${countMap[v]}</span>`:''}
    </label>`).join('');
}

function toggleFilter(gid,val,checked){
  const map={'filter-style':activeStyles,'filter-doll':activeDolls,'filter-tags':activeTags};
  if(checked)map[gid].add(val);else map[gid].delete(val);
  applyFilters();
}

function applyFilters(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const sMin=parseFloat(document.getElementById('size-min').value)||null;
  const sMax=parseFloat(document.getElementById('size-max').value)||null;
  const filtered=allItems.filter(item=>{
    if(q&&!item.name.toLowerCase().includes(q)&&!item.doll.toLowerCase().includes(q))return false;
    if(activeStyles.size&&!activeStyles.has(item.style))return false;
    if(activeDolls.size&&!activeDolls.has(item.doll))return false;
    if(activeTags.size&&![...activeTags].every(t=>item.tags.includes(t)))return false;
    if(sMin!==null&&(item.size===null||item.size<sMin))return false;
    if(sMax!==null&&(item.size===null||item.size>sMax))return false;
    return true;
  });
  document.getElementById('resultBar').textContent=`共 ${filtered.length} 件`;
  const g=document.getElementById('gallery');
  if(!filtered.length){g.innerHTML='<div class="empty">沒有符合條件的造型</div>';return;}
  g.innerHTML=filtered.map(item=>`
    <div class="card" onclick='openDetail(${JSON.stringify(item).replace(/'/g,"&#39;")})'>
      <div class="card-img">${item.cover?`<img src="${item.cover}" alt="${item.name}" loading="lazy">`:'<div class="card-no-img">◻</div>'}</div>
      <div class="card-body">
        <div class="card-title">${item.name}</div>
        <div class="card-meta">${[item.doll,item.size?item.size+'cm':''].filter(Boolean).join(' · ')}</div>
        <div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('');
}

function clearFilters(){
  activeStyles.clear();activeDolls.clear();activeTags.clear();
  document.getElementById('size-min').value='';
  document.getElementById('size-max').value='';
  document.getElementById('searchInput').value='';
  document.querySelectorAll('.filter-item input').forEach(cb=>cb.checked=false);
  applyFilters();
}

function openDetail(item){
  document.getElementById('detailContent').innerHTML=`
    ${item.cover?`<img class="detail-cover" src="${item.cover}" alt="${item.name}">`:''}
    <div class="detail-name">${item.name}</div>
    <div class="detail-rows">
      ${item.doll?`<div class="detail-row"><span class="dl">試穿娃娃</span><span>${item.doll}</span></div>`:''}
      ${item.style?`<div class="detail-row"><span class="dl">款式</span><span>${item.style}</span></div>`:''}
      ${item.size?`<div class="detail-row"><span class="dl">尺寸</span><span>${item.size} cm</span></div>`:''}
      ${item.origin?`<div class="detail-row"><span class="dl">產地</span><span>${item.origin}</span></div>`:''}
      ${item.tags.length?`<div class="detail-row"><span class="dl">標籤</span><div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:''}
      ${item.shop?`<div class="detail-row"><span class="dl">商家</span><a href="${item.shop.startsWith('http')?item.shop:'https://'+item.shop}" target="_blank" style="color:var(--text);word-break:break-all;text-decoration:underline">${item.shop}</a></div>`:''}
      ${item.note?`<div class="detail-row"><span class="dl">備註</span><span>${item.note}</span></div>`:''}
    </div>`;
  document.getElementById('detailModal').classList.add('open');
}

function openUpload(){document.getElementById('uploadModal').classList.add('open');}
function closeUpload(){document.getElementById('uploadModal').classList.remove('open');}

function handleFile(file){
  if(!file)return;
  selectedFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const prev=document.getElementById('preview');
    prev.src=e.target.result;prev.style.display='block';
    document.getElementById('uploadText').textContent=file.name;
  };
  reader.readAsDataURL(file);
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
}

async function uploadToSupabase(file){
  const ext=file.name.split('.').pop().toLowerCase();
  const filename=`${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/outfit-photos/${filename}`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':file.type,'x-upsert':'true'},
    body:file
  });
  if(!res.ok){const err=await res.text();throw new Error(err);}
  return`${BUCKET_URL}/${filename}`;
}

async function submitForm(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){setStatus('請填寫造型名稱','err');return;}
  if(!selectedFile){setStatus('請選擇照片','err');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;setStatus('上傳照片中...','');
  try{
    const imageUrl=await uploadToSupabase(selectedFile);
    setStatus('寫入資料庫...','');
    const tagsRaw=document.getElementById('f-tags').value;
    const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[];
    const shop=document.getElementById('f-shop').value.trim();
    const res=await fetch(EDGE_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
      body:JSON.stringify({action:'create',data:{
        name,imageUrl,
        doll:document.getElementById('f-doll').value.trim(),
        style:document.getElementById('f-style').value,
        size:document.getElementById('f-size').value,
        tags,
        note:document.getElementById('f-note').value.trim(),
        shop:shop.startsWith('http')?shop:'',
        origin:document.getElementById('f-origin').value,
      }})
    });
    if(!res.ok)throw new Error(await res.text());
    setStatus('上傳成功','ok');
    setTimeout(()=>{closeUpload();resetForm();loadItems();},1200);
  }catch(e){setStatus('失敗：'+e.message,'err');}
  finally{btn.disabled=false;}
}

function setStatus(msg,cls){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;el.className='status '+(cls||'');
}

function resetForm(){
  ['f-name','f-doll','f-size','f-tags','f-shop','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-style').value='';
  document.getElementById('f-origin').value='';
  document.getElementById('preview').style.display='none';
  document.getElementById('uploadText').textContent='點擊或拖曳上傳照片';
  selectedFile=null;setStatus('','');
}

document.getElementById('uploadModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeUpload();});
document.getElementById('detailModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});

loadItems();
</script>
