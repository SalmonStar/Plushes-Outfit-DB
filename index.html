<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>娃衣圖書館</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf8;
  --surface:#fff;
  --text:#1a1a1a;
  --muted:#999;
  --light:#eee;
  --border:#e8e8e4;
  --accent:#1a1a1a;
}
html{font-size:14px}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
header{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;padding:0 40px;height:60px;
  border-bottom:1px solid var(--border);background:var(--bg);
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:20px}
.header-issue{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em}
.header-logo{text-align:center}
.logo-jp{font-family:'Shippori Mincho',serif;font-size:20px;letter-spacing:.15em;font-weight:500}
.logo-en{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--muted);display:block;margin-top:2px}
.header-right{display:flex;justify-content:flex-end;align-items:center;gap:16px}
.nav-link{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--muted);cursor:pointer;background:none;border:none;transition:color .15s}
.nav-link:hover{color:var(--text)}
.upload-btn{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;
  background:var(--accent);color:#fff;border:none;
  padding:7px 14px;cursor:pointer;transition:opacity .15s;
}
.upload-btn:hover{opacity:.75}

/* ── Layout ── */
.layout{display:flex;min-height:calc(100vh - 60px)}

/* ── Sidebar ── */
.sidebar{
  width:200px;flex-shrink:0;padding:32px 20px;
  border-right:1px solid var(--border);
  position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;
  background:var(--bg);
}
.sidebar-block{margin-bottom:32px}
.sidebar-label{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;
  color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:block;
}
.filter-list{display:flex;flex-direction:column;gap:1px}
.filter-row{display:flex;align-items:center;gap:8px;padding:5px 4px;cursor:pointer;transition:background .1s;border-radius:1px}
.filter-row:hover{background:var(--border)}
.filter-row input[type=checkbox]{width:11px;height:11px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.filter-row .flabel{font-size:12px;color:var(--text);flex:1;cursor:pointer}
.filter-row .cnt{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.size-row{display:flex;align-items:center;gap:6px}
.size-in{width:52px;border:none;border-bottom:1px solid var(--border);padding:4px 0;font-size:12px;font-family:'Noto Sans TC',sans-serif;background:transparent;color:var(--text);outline:none}
.size-in:focus{border-bottom-color:var(--accent)}
.size-sep{font-size:10px;color:var(--muted)}
.clear-all{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:8px;display:block}
.clear-all:hover{color:var(--text)}

/* ── Main ── */
.main-wrap{flex:1;min-width:0}
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 32px 16px;border-bottom:1px solid var(--border);
}
.search-box{
  border:none;border-bottom:1px solid var(--border);
  padding:6px 0;font-size:13px;font-family:'Noto Sans TC',sans-serif;
  background:transparent;color:var(--text);outline:none;width:240px;
}
.search-box:focus{border-bottom-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.result-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em}

/* ── Gallery ── */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:0;
  padding:0;
}

/* Masonry-ish: alternate card heights */
.card{
  background:var(--surface);
  cursor:pointer;overflow:hidden;
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  transition:background .15s;
  position:relative;
}
.card:hover{background:#f5f5f2}
.card:hover .card-img img{transform:scale(1.05)}
.card-img{width:100%;overflow:hidden;background:var(--light)}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.card-no-img{display:flex;align-items:center;justify-content:center;background:var(--light);color:var(--border);font-size:32px}
.card-body{padding:14px 16px 16px}
.card-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px}
.card-title{font-family:'Shippori Mincho',serif;font-size:14px;font-weight:500;line-height:1.4;margin-bottom:6px;letter-spacing:.03em}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:.02em}
.tag-list{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;border:1px solid var(--border);padding:2px 6px;color:var(--muted)}

/* alternate heights for visual rhythm */
.card:nth-child(3n+1) .card-img{aspect-ratio:1}
.card:nth-child(3n+2) .card-img{aspect-ratio:.85}
.card:nth-child(3n) .card-img{aspect-ratio:1.1}

.empty{grid-column:1/-1;text-align:center;padding:80px;color:var(--muted);font-size:13px}

/* skeleton */
.skel .card-img{aspect-ratio:1;animation:sk 1.4s ease infinite}
.skel .skel-line{height:10px;border-radius:0;margin-bottom:8px;animation:sk 1.4s ease infinite}
.skel .skel-line.s{width:50%}
@keyframes sk{0%,100%{background:#eee}50%{background:#e4e4e0}}

/* ── Modals ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,26,26,.65);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);width:100%;max-width:480px;
  max-height:92vh;overflow-y:auto;padding:36px 32px;position:relative;
}
.modal-x{position:absolute;top:20px;right:20px;background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;line-height:1}
.modal-x:hover{color:var(--text)}
.modal-title{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:500;letter-spacing:.05em;margin-bottom:28px}
.fg{margin-bottom:16px}
.fg label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.fg input,.fg select,.fg textarea{
  width:100%;border:none;border-bottom:1px solid var(--border);
  padding:6px 0;font-size:13px;font-family:'Noto Sans TC',sans-serif;
  background:transparent;color:var(--text);outline:none;border-radius:0;-webkit-appearance:none;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-bottom-color:var(--accent)}
.fg textarea{resize:vertical;min-height:72px;border:1px solid var(--border);padding:8px;margin-top:2px}
.fg textarea:focus{border-color:var(--accent)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.upload-zone{
  border:1px solid var(--border);padding:28px 20px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;margin-top:2px;
}
.upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:#f8f8f5}
.upload-zone p{font-size:12px;color:var(--muted)}
.upload-zone .hint{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;margin-top:4px}
.upload-prev{width:100%;max-height:180px;object-fit:cover;margin-top:10px;display:none}
.submit-btn{
  width:100%;background:var(--accent);color:#fff;border:none;
  padding:12px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;
  cursor:pointer;margin-top:12px;transition:opacity .15s;
}
.submit-btn:hover{opacity:.75}
.submit-btn:disabled{opacity:.35;cursor:not-allowed}
.status-msg{text-align:center;font-size:11px;margin-top:10px;min-height:16px;font-family:'DM Mono',monospace;letter-spacing:.04em}
.status-msg.ok{color:#3a7a56}
.status-msg.err{color:#b03030}

/* detail */
.detail-img{width:100%;max-height:360px;object-fit:cover;display:block;margin-bottom:24px}
.detail-title{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:500;letter-spacing:.05em;margin-bottom:20px;line-height:1.4}
.detail-rows{display:flex;flex-direction:column;gap:10px}
.dr{display:flex;gap:16px;font-size:13px}
.dk{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;min-width:64px;padding-top:2px;flex-shrink:0}

@media(max-width:640px){
  header{padding:0 20px}
  .header-issue,.logo-en{display:none}
  .sidebar{display:none}
  .top-bar{padding:14px 16px}
  .search-box{width:160px}
  .gallery{grid-template-columns:repeat(2,1fr)}
  .card:nth-child(n) .card-img{aspect-ratio:1}
}

.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);z-index:50;max-height:200px;overflow-y:auto;display:none;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ac-item{padding:9px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.focused{background:var(--bg)}
.ac-item b{font-weight:600}

.filter-search{width:100%;border:none;border-bottom:1px solid var(--border);padding:4px 0;font-size:11px;font-family:'Noto Sans TC',sans-serif;background:transparent;color:var(--text);outline:none;margin-bottom:8px}
.filter-search:focus{border-bottom-color:var(--accent)}
.show-more-btn{background:none;border:none;font-size:10px;color:var(--muted);cursor:pointer;padding:4px 4px;font-family:'DM Mono',monospace;letter-spacing:.06em;margin-top:2px}
.show-more-btn:hover{color:var(--text)}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-issue">VOL.01</span>
    <button class="nav-link" onclick="clearFilters()">INDEX</button>
  </div>
  <div class="header-logo">
    <span class="logo-jp">娃衣圖書館</span>
    <span class="logo-en">PLUSHES OUTFIT ARCHIVE</span>
  </div>
  <div class="header-right">
    <button class="nav-link" id="filterToggle" onclick="toggleSidebar()">FILTER</button>
    <button class="upload-btn" onclick="openUpload()">SUBMIT</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-block">
      <span class="sidebar-label">款式</span>
      <input class="filter-search" type="text" id="fs-style" placeholder="搜尋..." oninput="filterSearch('fl-style',this.value)">
      <div class="filter-list" id="fl-style"></div>
    </div>
    <div class="sidebar-block">
      <span class="sidebar-label">試穿娃娃</span>
      <input class="filter-search" type="text" id="fs-doll" placeholder="搜尋..." oninput="filterSearch('fl-doll',this.value)">
      <div class="filter-list" id="fl-doll"></div>
    </div>
    <div class="sidebar-block">
      <span class="sidebar-label">尺寸 cm</span>
      <div class="size-row">
        <input class="size-in" type="number" id="sz-min" placeholder="min" oninput="applyFilters()">
        <span class="size-sep">—</span>
        <input class="size-in" type="number" id="sz-max" placeholder="max" oninput="applyFilters()">
      </div>
    </div>
    <div class="sidebar-block">
      <span class="sidebar-label">標籤</span>
      <input class="filter-search" type="text" id="fs-tags" placeholder="搜尋..." oninput="filterSearch('fl-tags',this.value)">
      <div class="filter-list" id="fl-tags"></div>
    </div>
    <button class="clear-all" onclick="clearFilters()">CLEAR ALL</button>
  </aside>

  <div class="main-wrap">
    <div class="top-bar">
      <input class="search-box" type="text" id="searchQ" placeholder="Search..." oninput="applyFilters()">
      <span class="result-count" id="rcount">—</span>
    </div>
    <div class="gallery" id="gallery">
      ${Array(8).fill(0).map(()=>`<div class="card skel"><div class="card-img"></div><div class="card-body"><div class="skel-line" style="background:#eee;height:10px;margin-bottom:8px"></div><div class="skel-line s" style="background:#eee;height:10px;width:50%"></div></div></div>`).join('')}
    </div>
  </div>
</div>

<!-- Upload modal -->
<div class="modal-bg" id="upModal">
  <div class="modal">
    <button class="modal-x" onclick="closeUpload()">×</button>
    <div class="modal-title">Submit Outfit</div>

    <div class="fg">
      <label>造型名稱 *</label>
      <input type="text" id="f-name" placeholder="例：台大米白帽T">
    </div>
    <div class="fg">
      <label>照片 *</label>
      <div class="upload-zone" id="upZone"
        onclick="document.getElementById('fInput').click()"
        ondragover="event.preventDefault();this.classList.add('over')"
        ondragleave="this.classList.remove('over')"
        ondrop="handleDrop(event)">
        <p id="upText">點擊或拖曳上傳</p>
        <p class="hint">JPG / PNG</p>
        <img class="upload-prev" id="upPreview" alt="">
      </div>
      <input type="file" id="fInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
    </div>
    <div class="two">
      <div class="fg" style="position:relative"><label>試穿娃娃</label><input type="text" id="f-doll" placeholder="例：SUNSUN玩偶" autocomplete="off" oninput="showAC(this,'ac-doll')"><div id="ac-doll" class="ac-list"></div></div>
      <div class="fg" style="position:relative"><label>款式</label><input type="text" id="f-style" placeholder="例：上衣" autocomplete="off" oninput="showAC(this,'ac-style')"><div id="ac-style" class="ac-list"></div></div>
    </div>
    <div class="two">
      <div class="fg"><label>娃娃尺寸 cm</label><input type="number" id="f-size" placeholder="28"></div>
      <div class="fg"><label>產地</label>
        <select id="f-origin">
          <option value="">—</option>
          <option>台灣</option><option>日本</option><option>韓國</option><option>中國</option><option>不確定</option>
        </select>
      </div>
    </div>
    <div class="fg" style="position:relative"><label>標籤（逗號分隔）</label><input type="text" id="f-tags" placeholder="休閒, 日系, 可愛" autocomplete="off" oninput="showAC(this,'ac-tags')"><div id="ac-tags" class="ac-list"></div></div>
    <div class="fg"><label>商家連結</label><input type="text" id="f-shop" placeholder="https://..."></div>
    <div class="fg"><label>備註</label><textarea id="f-note" placeholder="尺寸建議、穿搭心得..."></textarea></div>
    <button class="submit-btn" id="subBtn" onclick="submitForm()">UPLOAD</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-bg" id="detModal">
  <div class="modal" style="max-width:540px">
    <button class="modal-x" onclick="document.getElementById('detModal').classList.remove('open')">×</button>
    <div id="detContent"></div>
  </div>
</div>

<script>
const SB_URL="https://jakxuqbfplyohjshqnlp.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impha3h1cWJmcGx5b2hqc2hxbmxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDUxOTksImV4cCI6MjA5MzcyMTE5OX0.PtSj2MKFARo88C0Hp4HTRDobanaI2xPSG3goPmNkCLM";
const EDGE=`${SB_URL}/functions/v1/notion-proxy`;
const BUCKET=`${SB_URL}/storage/v1/object/public/outfit-photos`;

let items=[],selFile=null;
let aStyles=new Set(),aDolls=new Set(),aTags=new Set();

const hdrs={'Content-Type':'application/json','Authorization':`Bearer ${SB_KEY}`};

async function load(){
  try{
    const r=await fetch(EDGE,{method:'POST',headers:hdrs,body:JSON.stringify({action:'list'})});
    const d=await r.json();
    items=(d.results||[]).map((pg,i)=>{
      const p=pg.properties;
      return{
        idx:String(i+1).padStart(3,'0'),
        id:pg.id,
        name:p['娃衣名稱']?.title?.[0]?.text?.content||'Untitled',
        doll:p['試穿娃娃']?.select?.name ? [p['試穿娃娃'].select.name] : [],
        style:p['款式']?.multi_select?.map(t=>t.name)||[],
        size:p['娃娃尺寸']?.number||null,
        tags:p['標籤']?.multi_select?.map(t=>t.name)||[],
        note:p['備註']?.rich_text?.[0]?.text?.content||'',
        shop:p['商家連結或名稱']?.rich_text?.[0]?.text?.content||'',
        origin:p['產地']?.select?.name||'',
        cover:pg.cover?.external?.url||pg.cover?.file?.url||null,
      };
    });
    buildFilters();
    applyFilters();
  }catch(e){
    document.getElementById('gallery').innerHTML='<div class="empty">載入失敗</div>';
    document.getElementById('rcount').textContent='error';
  }
}

function buildFilters(){
  const styles=[...new Set(items.map(i=>i.style).filter(Boolean))].sort();
  renderCBs('fl-style',styles,aStyles);
  // populate upload select dynamically
  // styles available for autocomplete (used by showAC)

  const dolls=[...new Set(items.map(i=>i.doll).filter(Boolean))].sort();
  renderCBs('fl-doll',dolls,aDolls);

  const tm={};items.forEach(i=>i.tags.forEach(t=>tm[t]=(tm[t]||0)+1));
  const tags=Object.keys(tm).sort((a,b)=>tm[b]-tm[a]);
  renderCBs('fl-tags',tags,aTags,tm);
}

function makeRow(id, v, activeSet, cmap) {
  const checked = activeSet.has(v) ? 'checked' : '';
  const cnt = cmap ? '<span class="cnt">' + cmap[v] + '</span>' : '';
  return '<label class="filter-row">'
    + '<input type="checkbox" value="' + v + '" ' + checked + ' onchange="tog(\'' + id + '\',\'' + v.replace(/'/g,"\\'") + '\',this.checked)">'
    + '<span class="flabel">' + v + '</span>'
    + cnt
    + '</label>';
}

function renderCBs(id, vals, activeSet, cmap, maxShow=6) {
  const el = document.getElementById(id);
  if (!vals.length) { el.innerHTML = '<span style="font-size:11px;color:var(--muted)">—</span>'; return; }
  const shown = vals.slice(0, maxShow);
  const rest = vals.slice(maxShow);
  let html = shown.map(v => makeRow(id, v, activeSet, cmap)).join('');
  if (rest.length) {
    html += '<div id="' + id + '-more" style="display:none">' + rest.map(v => makeRow(id, v, activeSet, cmap)).join('') + '</div>';
    html += '<button class="show-more-btn" onclick="toggleMore(\'' + id + '-more\',this)">+ ' + rest.length + ' 更多</button>';
  }
  el.innerHTML = html;
}

function toggleMore(id,btn){
  const el=document.getElementById(id);
  const hidden=el.style.display==='none';
  el.style.display=hidden?'':'none';
  btn.textContent=hidden?'− 收起':'+ '+(el.children.length)+' 更多';
}


function filterSearch(listId, q) {
  const rows = document.querySelectorAll('#' + listId + ' .filter-row');
  rows.forEach(row => {
    const label = row.querySelector('.flabel');
    if (!label) return;
    row.style.display = label.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function tog(gid,val,on){
  const m={'fl-style':aStyles,'fl-doll':aDolls,'fl-tags':aTags};
  on?m[gid].add(val):m[gid].delete(val);
  applyFilters();
}

function applyFilters(){
  const q=(document.getElementById('searchQ').value||'').toLowerCase();
  const sMin=parseFloat(document.getElementById('sz-min').value)||null;
  const sMax=parseFloat(document.getElementById('sz-max').value)||null;
  const f=items.filter(item=>{
    if(q&&!item.name.toLowerCase().includes(q)&&!item.doll.toLowerCase().includes(q))return false;
    if(aStyles.size&&![...aStyles].some(s=>item.style.includes(s)))return false;
    if(aDolls.size&&![...aDolls].some(d=>item.doll.includes(d)))return false;
    if(aTags.size&&![...aTags].every(t=>item.tags.includes(t)))return false;
    if(sMin!==null&&(item.size===null||item.size<sMin))return false;
    if(sMax!==null&&(item.size===null||item.size>sMax))return false;
    return true;
  });
  document.getElementById('rcount').textContent=`${f.length} ITEMS`;
  const g=document.getElementById('gallery');
  if(!f.length){g.innerHTML='<div class="empty">No results found.</div>';return;}
  g.innerHTML=f.map(item=>`
    <div class="card" onclick='openDetail(${JSON.stringify(item).replace(/'/g,"&#39;")})'>
      <div class="card-img" style="aspect-ratio:1">
        ${item.cover?`<img src="${item.cover}" alt="${item.name}" loading="lazy">`:`<div class="card-no-img" style="aspect-ratio:1">○</div>`}
      </div>
      <div class="card-body">
        <div class="card-num">No.${item.idx}</div>
        <div class="card-title">${item.name}</div>
        <div class="card-meta">${[item.doll.join(' / '),item.size?item.size+'cm':''].filter(v=>v).join('  ·  ')}</div>
        <div class="tag-list">

async function uploadImg(file){
  const ext=file.name.split('.').pop().toLowerCase();
  const fname=`${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const res=await fetch(`${SB_URL}/storage/v1/object/outfit-photos/${fname}`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'},
    body:file
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  return`${BUCKET}/${fname}`;
}

const AC_SOURCES = {
  'ac-doll': () => [...new Set(items.flatMap(i => i.doll).filter(Boolean))].sort(),
  'ac-style': () => [...new Set(items.flatMap(i => i.style).filter(Boolean))].sort(),
  'ac-tags': () => {
    const tm = {};
    items.forEach(i => i.tags.forEach(t => tm[t] = (tm[t]||0)+1));
    return Object.keys(tm).sort((a,b) => tm[b]-tm[a]);
  },
};

function showAC(input, listId) {
  const rawQ = input.value;
  // for tags and style, autocomplete the last token after comma
  const isMulti = listId === 'ac-tags' || listId === 'ac-style';
  const q = isMulti ? rawQ.split(',').pop().trim().toLowerCase() : rawQ.trim().toLowerCase();
  const list = document.getElementById(listId);
  if (!q) { list.style.display = 'none'; return; }
  const opts = AC_SOURCES[listId]().filter(v => v.toLowerCase().includes(q)).slice(0, 10);
  if (!opts.length) { list.style.display = 'none'; return; }
  list.innerHTML = opts.map(v => {
    const safe = v.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const hi = safe.replace(new RegExp('(' + safeQ + ')', 'gi'), '<b>$1</b>');
    return '<div class="ac-item" onmousedown="pickAC(event,\'' + input.id + '\',\'' + listId + '\',\'' + v.replace(/'/g,"\'") + '\')">' + hi + '</div>';
  }).join('');
  list.style.display = 'block';
}

function pickAC(e, inputId, listId, val) {
  e.preventDefault();
  const input = document.getElementById(inputId);
  if (listId === 'ac-tags' || listId === 'ac-style') {
    // replace last token
    const parts = input.value.split(',');
    parts[parts.length - 1] = ' ' + val;
    input.value = parts.join(',').replace(/^\s*,/, '') + ', ';
  } else {
    input.value = val;
  }
  document.getElementById(listId).style.display = 'none';
  input.focus();
}
